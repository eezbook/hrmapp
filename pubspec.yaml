name: hrmapp
description: HRM Mobile App — Leave, Travel, Training, Overtime
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.8.0 <4.0.0'
  flutter: '>=3.22.0'

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter

  # State Management
  flutter_bloc: ^8.1.5
  equatable: ^2.0.5

  # Networking
  dio: ^5.4.0
  retrofit: ^4.1.0

  # DI
  get_it: ^7.6.7

  # Local Storage
  hive_flutter: ^1.1.0
  flutter_secure_storage: ^9.0.0
  sqflite: ^2.3.3
  path: ^1.9.0
  uuid: ^4.4.2

  # Notifications
  flutter_local_notifications: ^17.0.0

  # Media
  image_picker: ^1.0.7
  video_player: ^2.8.3
  chewie: ^1.7.4
  cached_network_image: ^3.3.1

  # Auth
  local_auth: ^2.2.0

  # Charts & Calendar
  fl_chart: ^0.67.0
  table_calendar: ^3.1.0

  # UI
  shimmer: ^3.0.0

  # Location
  geolocator: ^13.0.1

  # Connectivity
  connectivity_plus: ^6.0.3

  # Permissions
  permission_handler: ^11.3.0

  # Internationalisation
  intl: ^0.20.0

  # Functional
  dartz: ^0.10.1

  # Code Generation
  freezed_annotation: ^3.0.0
  json_annotation: ^4.12.0

  # Navigation
  go_router: ^13.2.0

  # File Operations
  open_filex: ^4.4.1
  share_plus: ^10.0.0

  # Environment
  flutter_dotenv: ^5.1.0

  # Device Info
  device_info_plus: ^10.1.0

  # PDF viewer
  flutter_pdfview: ^1.3.2

  # WebView
  webview_flutter: ^4.7.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0
  build_runner: ^2.4.9
  freezed: ^3.0.0
  json_serializable: ^6.7.1
  retrofit_generator: ^10.0.0
  bloc_test: ^9.1.7
  mocktail: ^1.0.4

flutter:
  uses-material-design: true

  assets:
    - assets/images/
    - assets/icons/
    - .env.dev
    - .env.staging
    - .env.prod

  fonts:
    - family: Poppins
      fonts:
        - asset: assets/fonts/Poppins-Regular.ttf
        - asset: assets/fonts/Poppins-Medium.ttf
          weight: 500
        - asset: assets/fonts/Poppins-SemiBold.ttf
          weight: 600
        - asset: assets/fonts/Poppins-Bold.ttf
          weight: 700
